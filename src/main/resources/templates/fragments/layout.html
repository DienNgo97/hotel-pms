<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="nav">
    <div class="topbar">
        <span class="logo">🏨 Cloudbeds Mock PMS</span>
        <a href="/admin">Dashboard</a>
        <a href="/admin/hotels">Hotels</a>
        <a href="/admin/reservations">Reservations</a>
    </div>
    <!-- Hộp thoại xác nhận dùng chung (thay confirm() native) — phần tử có data-confirm -->
    <div id="pmsCfm" style="position:fixed;inset:0;background:rgba(16,36,59,.5);display:none;align-items:center;justify-content:center;z-index:1500;padding:16px">
        <div style="background:#fff;max-width:420px;width:100%;border-radius:14px;padding:22px;box-shadow:0 20px 50px rgba(0,0,0,.3);font-family:system-ui,Segoe UI,Roboto,sans-serif">
            <h3 style="margin:0 0 8px;font-size:18px;color:#16382a">Xác nhận</h3>
            <p id="pmsCfmMsg" style="margin:0 0 18px;color:#333;font-size:14px;line-height:1.6"></p>
            <div style="display:flex;gap:10px;justify-content:flex-end">
                <button type="button" id="pmsCfmCancel" style="padding:9px 16px;border:1px solid #cfd6e2;background:#fff;border-radius:8px;cursor:pointer;font-size:14px">Huỷ</button>
                <button type="button" id="pmsCfmOk" style="padding:9px 16px;border:0;background:#3dac78;color:#fff;border-radius:8px;cursor:pointer;font-weight:600;font-size:14px">Đồng ý</button>
            </div>
        </div>
    </div>
    <script>
    (function(){
        var m=document.getElementById('pmsCfm'); if(!m) return;
        var msg=document.getElementById('pmsCfmMsg'), ok=document.getElementById('pmsCfmOk'), cancel=document.getElementById('pmsCfmCancel');
        var pending=null;
        function closeIt(){ m.style.display='none'; pending=null; }
        document.addEventListener('click',function(e){
            var el=e.target.closest('[data-confirm]'); if(!el) return;
            e.preventDefault(); pending=el; msg.textContent=el.getAttribute('data-confirm'); m.style.display='flex';
        });
        cancel.addEventListener('click',closeIt);
        m.addEventListener('click',function(e){ if(e.target===m) closeIt(); });
        ok.addEventListener('click',function(){
            var el=pending; closeIt(); if(!el) return;
            var f=el.closest('form'); if(f){ if(f.requestSubmit) f.requestSubmit(); else f.submit(); }
        });
    })();
    </script>
</div>

<div th:fragment="flash">
    <div class="flash ok" th:if="${message}" th:text="${message}"></div>
    <div class="flash err" th:if="${error}" th:text="${error}"></div>
</div>
</body>
</html>
