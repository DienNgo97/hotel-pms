spring:
  application:
    name: hotel-pms
  datasource:
    url: ${HOTEL_PMS_DB_URL:jdbc:mysql://localhost:3306/hotel_pms?useUnicode=true&characterEncoding=UTF-8&connectionTimeZone=LOCAL&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${HOTEL_PMS_DB_USERNAME:booking}
    password: ${HOTEL_PMS_DB_PASSWORD:booking_dev_pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  thymeleaf:
    cache: false

server:
  port: 8082

# API key ma booking-platform gui qua header X-API-KEY (khop voi cau hinh integration: dev-pms-key-67890)
app:
  api-key: ${HOTEL_PMS_API_KEY:dev-pms-key-67890}
  # PROV-X1: cac thao tac GHI cua Admin UI (/admin/** POST/PUT/DELETE/PATCH) yeu cau auth.
  admin-ui:
    # token rieng cho admin UI; mac dinh dung lai api-key de dev demo van chay (gui header X-API-KEY).
    token: ${HOTEL_PMS_ADMIN_TOKEN:${app.api-key}}
    # bat true de mo lai admin UI hoan toan public ke ca POST (chi dung cho dev demo cuc nhanh).
    public: ${HOTEL_PMS_ADMIN_UI_PUBLIC:false}

logging:
  level:
    org.hibernate.SQL: warn
